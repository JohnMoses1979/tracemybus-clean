name: Deploy TraceMyBus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -e

          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is missing"
            exit 1
          fi

          if [ -z "$EC2_USER" ]; then
            echo "EC2_USER secret is missing"
            exit 1
          fi

          if [ -z "$EC2_SSH_KEY_B64" ]; then
            echo "EC2_SSH_KEY_B64 secret is missing"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY_B64" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e

          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cd /home/ubuntu/tracemybus-clean && git fetch origin main && git reset --hard origin/main && docker compose down && docker compose up -d --build && sleep 25 && curl -f http://localhost:8080/ && curl -f http://localhost:8080/api/public/orgs && docker image prune -f && echo Deployment completed successfully"
